<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Roshu ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  overflow: hidden;
}

.envelope {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  height: 120px;
  background: #fff;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 3;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.envelope:before {
  content: "💌 Tap to open";
  color: #e91e63;
}

.letter {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 70%;
  max-width: 700px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  z-index: 4;
}

h1 { text-align:center; color:#e91e63; }
p { line-height:1.6; white-space:pre-line; }

.heart {
  position: absolute;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity:1; }
  100% { transform: translateY(-10vh); opacity:0; }
}

canvas { position:absolute; top:0; left:0; z-index:1; }

.cheer {
  position: fixed;
  bottom: 15px;
  right: 15px;
  z-index: 5;
  text-align: center;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.cheer-text {
  background: white;
  padding: 8px;
  border-radius: 15px;
  font-size: 12px;
  color: #e91e63;
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter()"></div>

<div class="letter" id="letter">
  <h1>To My Roshu ❤️</h1>
  <p id="text"></p>
</div>

<div class="cheer">
  <div style="font-size:40px;">💃</div>
  <div class="cheer-text">It’s your kanda 💖<br>your forever cheerleader!</div>
</div>

<!-- 🔥 IMPORTANT: replace song.mp3 with YOUR uploaded file name -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<canvas id="confetti"></canvas>

<script>

const message = `Roshu... ❤️

I don’t quite know where this began — only that somewhere along the way, you became a feeling I can’t unfeel.

We aren’t standing at a promise yet… but in my heart, I have already chosen you.

You feel like calm. You feel like certainty.

And if this is just the beginning,
then I will spend a lifetime choosing you —
again, and again, and again.

Yours, always ❤️`;

let i = 0;
function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}

function openLetter() {
  document.querySelector('.envelope').style.display = 'none';
  document.getElementById('letter').style.display = 'block';

  const music = document.getElementById('music');
  music.volume = 0;

  // 🔥 important fix
  music.load();

  music.play().then(() => {
    let vol = 0;
    const fade = setInterval(() => {
      if (vol < 1) {
        vol += 0.05;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 200);
  }).catch(() => {
    alert("Tap anywhere once more to play music ❤️");
  });

  typeWriter();
  startHearts();
}

function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*window.innerWidth+"px";
    heart.style.fontSize = Math.random()*20+10+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
  }, 300);
}

// Confetti
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];
for (let i = 0; i < 150; i++) {
  confetti.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*6+2
  });
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#fff";
  confetti.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fill();
    c.y += 2;
    if(c.y > canvas.height) c.y = 0;
  });
}

setInterval(drawConfetti,30);

setTimeout(()=>{
  alert("I love you more than you’ll ever know ❤️");
},15000);

</script>

</body>
</html>
