<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Roshu ❤️</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  overflow: hidden;
}

.envelope {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  height: 120px;
  background: #fff;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 3;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.envelope:before {
  content: "💌 Tap to open";
  font-size: 14px;
  color: #e91e63;
}

.letter {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 70%;
  max-width: 700px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  z-index: 4;
}

h1 { text-align:center; color:#e91e63; }
p { font-size:16px; line-height:1.6; color:#444; white-space:pre-line; }

.heart {
  position: absolute;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity:1; }
  100% { transform: translateY(-10vh); opacity:0; }
}

canvas { position:absolute; top:0; left:0; z-index:1; }

.cheer {
  position: fixed;
  bottom: 15px;
  right: 15px;
  z-index: 5;
  text-align: center;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.cheer-text {
  background: white;
  padding: 8px 12px;
  border-radius: 15px;
  font-size: 12px;
  color: #e91e63;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<div class="envelope" onclick="openLetter()"></div>

<div class="letter" id="letter">
  <h1>To My Roshu ❤️</h1>
  <p id="text"></p>
</div>

<div class="cheer">
  <div style="font-size:40px;">💃</div>
  <div class="cheer-text">It’s your kanda 💖<br>your forever cheerleader!</div>
</div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<canvas id="confetti"></canvas>

<script>

const message = `Roshu... ❤️

I don’t quite know where this began — only that somewhere along the way, you became a feeling I can’t unfeel.
We aren’t standing at a promise yet, not officially… no ring, no grand moment the world can point to.
But in the quiet corners of my heart, I have already chosen you.
Not for what you have.
Not for what the world sees.
But for who you are when no one is watching.
I chose the gentleman in you—effortless, not performed.
I chose the kindness that speaks even in your silence.
I chose the calm I see in your eyes… the kind that makes chaos feel distant.
And that smile of yours—soft, grounding, certain—it feels like home in a way I can’t explain.
There’s something about your eyes…
They don’t just look at me, they understand me.
And in that moment, saying no was never really an option.
This isn’t rushed.
This isn’t uncertain.
This is the quiet kind of right—the kind that doesn’t need to prove itself.
So until the day a ring makes it official,
I just want you to know this truth I already carry—
You are mine, in the way souls recognize each other…
And I am yours, in every way that truly matters.
And if this is only the beginning,
then I will spend a lifetime choosing you—
again, and again, and again.

Yours, always. ❤️`;

let i = 0;
function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}

function openLetter() {
  document.querySelector('.envelope').style.display = 'none';
  document.getElementById('letter').style.display = 'block';

  const music = document.getElementById('music');
  music.volume = 0;
  music.play().catch(()=>{});

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);

  typeWriter();
  startHearts();
}

function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*window.innerWidth+"px";
    heart.style.fontSize = Math.random()*20+10+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
  }, 300);
}

const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const confetti = [];
for (let i = 0; i < 150; i++) {
  confetti.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*6+2,d:Math.random()*150});
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#fff";
  ctx.beginPath();
  confetti.forEach(c=>{
    ctx.moveTo(c.x,c.y);
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2,true);
  });
  ctx.fill();
  updateConfetti();
}

function updateConfetti(){
  confetti.forEach(c=>{
    c.y+=Math.cos(c.d)+1+c.r/2;
    if(c.y>canvas.height){c.y=0;}
  });
}

setInterval(drawConfetti,30);

setTimeout(()=>{
  alert("I love you more than you’ll ever know ❤️");
},15000);

</script>

</body>
</html>
